name: Repository dispatch echo

on:
  repository_dispatch:
    types:
      - create_team
      - update_team
      - create_virtual_account
      - update_virtual_account
      - delete_virtual_account

permissions:
  contents: read

jobs:
  echo:
    name: Echo payload
    runs-on: ubuntu-latest
    steps:
      - name: Payload type and client payload
        env:
          # Matches the API event_type the app sends (e.g. create_team for team approval)
          DISPATCH_ACTION: ${{ github.event.action }}
          CLIENT_PAYLOAD_JSON: ${{ toJSON(github.event.client_payload) }}
        run: |
          echo "action=${DISPATCH_ACTION}"
          echo "client_payload=${CLIENT_PAYLOAD_JSON}"
